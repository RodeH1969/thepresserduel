<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Presser — Maths Duel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060709; --surface: #0e1016; --surface2: #161a22;
  --border: rgba(255,255,255,0.09); --text: #f0f4ff; --muted: rgba(240,244,255,0.45);
  --blue: #4f8ef7; --red: #f7504f; --green: #3ecf6a; --amber: #f5a623; --pink: #f472b6; --white: #ffffff;
  --fd: 'Bebas Neue', sans-serif; --fm: 'DM Mono', monospace; --fb: 'DM Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem;}
.screen.active{display:flex;}

.logo{font-family:var(--fd);font-size:clamp(4rem,16vw,9rem);letter-spacing:.02em;line-height:.88;text-align:center;margin-bottom:.15em;
  background:linear-gradient(160deg,#fff 0%,rgba(255,255,255,.55) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-family:var(--fm);font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:2.5rem;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2rem 1.75rem;width:100%;max-width:420px;display:flex;flex-direction:column;gap:1rem;}
.card-title{font-family:var(--fm);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

input[type=text],input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font:inherit;font-size:1.05rem;font-weight:700;padding:.75rem 1rem;width:100%;outline:none;transition:border-color .2s;}
input:focus{border-color:rgba(255,255,255,.3);}

.btn{background:var(--white);color:var(--bg);border:none;border-radius:999px;font:inherit;font-size:.8rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:.85rem 2rem;cursor:pointer;width:100%;transition:transform .15s;}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.98);}
.btn.outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn.outline:hover{border-color:rgba(255,255,255,.3);}

.btn-challenge{
  background:var(--pink);color:#3d0020;border:none;border-radius:999px;
  font:inherit;font-size:1rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
  padding:1.1rem 2rem;cursor:pointer;width:100%;
  animation:pinkPulse 1.4s infinite;
}
@keyframes pinkPulse{0%{box-shadow:0 0 0 0 rgba(244,114,182,.7);}70%{box-shadow:0 0 0 20px rgba(244,114,182,0);}100%{box-shadow:0 0 0 0 rgba(244,114,182,0);}}
.btn-challenge:hover{transform:scale(1.03);}

.divider{display:flex;align-items:center;gap:.75rem;font-family:var(--fm);font-size:.65rem;color:var(--muted);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* WAITING */
.room-code-display{font-family:var(--fd);font-size:clamp(4rem,18vw,8rem);letter-spacing:.12em;color:var(--white);text-align:center;line-height:1;margin:.5rem 0 1rem;}
.waiting-pulse{display:flex;align-items:center;gap:.5rem;font-family:var(--fm);font-size:.7rem;color:var(--amber);letter-spacing:.15em;text-transform:uppercase;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:dotpulse 1.2s infinite;}
@keyframes dotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.players-joined{display:flex;flex-direction:column;gap:.5rem;width:100%;}
.player-pill{display:flex;align-items:center;gap:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.6rem .9rem;font-weight:700;font-size:.95rem;}
.badge{font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;padding:.2rem .55rem;border-radius:999px;text-transform:uppercase;}
.badge.host{background:rgba(79,142,247,.18);color:var(--blue);}
.badge.champ{background:rgba(244,114,182,.18);color:var(--pink);}
.badge.challenger{background:rgba(247,80,79,.18);color:var(--red);}

.vs-strip{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;text-align:center;width:100%;}
.vs-label{font-family:var(--fm);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem;}
.vs-name{font-family:var(--fd);font-size:2rem;color:var(--pink);letter-spacing:.05em;}
.vs-record{font-family:var(--fm);font-size:.7rem;color:var(--muted);margin-top:.1rem;}

/* COUNTDOWN */
.countdown-num{font-family:var(--fd);font-size:clamp(8rem,30vw,16rem);line-height:1;color:var(--white);animation:countPop .4s cubic-bezier(.16,1,.3,1);}
@keyframes countPop{from{transform:scale(1.4);opacity:0}to{transform:scale(1);opacity:1}}

/* GAME */
#gameScreen{gap:0;padding:1rem;justify-content:flex-start;}
.scorebar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%;max-width:640px;gap:.5rem;padding:.75rem 0;margin-bottom:.5rem;}
.score-block{display:flex;flex-direction:column;gap:.1rem;}
.score-block.right{text-align:right;}
.score-player-name{font-family:var(--fm);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;}
.score-block:first-child .score-player-name{color:var(--blue);}
.score-block:last-child .score-player-name{color:var(--red);}
.score-number{font-family:var(--fd);font-size:2.4rem;line-height:1;}
.q-badge{font-family:var(--fm);font-size:.65rem;color:var(--muted);text-align:center;white-space:nowrap;}

.timer-wrap{width:100%;max-width:640px;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:.75rem;}
.timer-fill{height:100%;width:100%;border-radius:3px;background:var(--green);}

.question-wrap{width:100%;max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.75rem 1.5rem 1.5rem;display:flex;flex-direction:column;gap:1.25rem;}
.question-eq{font-family:var(--fd);font-size:clamp(3rem,12vw,6rem);line-height:1;text-align:center;color:var(--white);}
.answer-label{font-family:var(--fm);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:center;}
.answer-row{display:flex;gap:.6rem;}
.answer-row input{flex:1;text-align:center;font-family:var(--fd);font-size:2.8rem;padding:.6rem .5rem;border-radius:12px;letter-spacing:.04em;}
.answer-row input.correct{border-color:var(--green);background:rgba(62,207,106,.08);color:var(--green);}
.answer-row input.wrong{border-color:var(--red);background:rgba(247,80,79,.08);color:var(--red);}
.lock-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text);border-radius:12px;font:inherit;font-size:.78rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:0 1.2rem;cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap;}
.lock-btn:hover:not(:disabled){background:rgba(255,255,255,.14);transform:translateY(-1px);}
.lock-btn:disabled{opacity:.35;cursor:not-allowed;}
.lock-btn.done{background:rgba(62,207,106,.18);border-color:rgba(62,207,106,.4);color:var(--green);}
.status-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-family:var(--fm);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;}
.status-pill{padding:.4rem .6rem;border-radius:8px;text-align:center;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.status-pill.locked-in{background:rgba(62,207,106,.1);border-color:rgba(62,207,106,.3);color:var(--green);}
.status-pill.waiting-lock{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.2);color:var(--amber);}
.reveal-strip{background:var(--surface2);border-radius:12px;padding:.75rem 1rem;text-align:center;display:none;}
.reveal-answer{font-family:var(--fm);font-size:.7rem;color:var(--muted);margin-bottom:.2rem;}
.reveal-pts{font-family:var(--fd);font-size:1.8rem;color:var(--white);}
.next-btn-wrap{display:none;padding-top:.5rem;}
@keyframes redFlash{0%,100%{background:var(--surface)}50%{background:rgba(247,80,79,.08)}}
.urgent{animation:redFlash .35s infinite;}

/* RESULTS */
.trophy-big{font-size:5rem;text-align:center;animation:trophyIn .6s cubic-bezier(.16,1,.3,1) forwards;transform:scale(0);margin-bottom:.5rem;}
@keyframes trophyIn{to{transform:scale(1)}}
.winner-headline{font-family:var(--fd);font-size:clamp(3rem,12vw,7rem);line-height:.92;text-align:center;
  background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:.3rem 0;}
.winner-tag{font-family:var(--fm);font-size:.75rem;letter-spacing:.2em;color:var(--muted);text-align:center;margin-bottom:.5rem;}
.streak-line{font-family:var(--fd);font-size:1.6rem;color:var(--pink);text-align:center;letter-spacing:.04em;margin-bottom:1.25rem;}
.final-scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:420px;margin-bottom:1.5rem;}
.final-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;text-align:center;}
.final-card.winner-card{border-color:rgba(255,255,255,.3);}
.final-card-name{font-family:var(--fm);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.final-card-score{font-family:var(--fd);font-size:3.2rem;line-height:1;}
.results-actions{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:420px;}

/* Waiting for challenger state (post-share) */
.challenger-wait{text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;}
.challenger-wait-txt{font-family:var(--fm);font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--pink);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--white);color:var(--bg);border-radius:999px;padding:.6rem 1.4rem;font-weight:700;font-size:.82rem;transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:1000;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- LOBBY -->
<div class="screen active" id="lobbyScreen">
  <div class="logo">The<br>Presser</div>
  <div class="logo-sub">Maths Duel · Beat One · Challenge Next</div>
  <div class="card">
    <div class="card-title">Your name</div>
    <input type="text" id="playerName" placeholder="Enter your name" maxlength="16" autocomplete="off">
    <button class="btn" id="createRoomBtn">Create Room</button>
    <div class="divider">or accept a challenge</div>
    <input type="text" id="joinCode" placeholder="Room code" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:.2em;font-family:var(--fm);text-align:center;">
    <button class="btn outline" id="joinRoomBtn">Accept Challenge</button>
  </div>
</div>

<!-- WAITING (for host pre-game) -->
<div class="screen" id="waitingScreen">
  <div class="logo" style="font-size:clamp(2rem,8vw,4rem);margin-bottom:.3rem;">The Presser</div>
  <div class="logo-sub" style="margin-bottom:1.5rem;">Waiting for challenger</div>
  <div class="card" style="gap:.85rem;align-items:center;">
    <div class="players-joined" id="playersList"></div>
    <div class="waiting-pulse" id="waitingMsg"><div class="dot"></div><span id="waitingTxt">Waiting for challenger…</span></div>
    <button class="btn green hidden" id="startGameBtn">Start The Presser!</button>
  </div>
</div>

<!-- COUNTDOWN -->
<div class="screen" id="countdownScreen">
  <div class="logo-sub" style="margin-bottom:1rem;">Get ready…</div>
  <div class="countdown-num" id="countdownNum">3</div>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <div class="scorebar">
    <div class="score-block">
      <div class="score-player-name" id="sn1">Host</div>
      <div class="score-number" id="sc1">0</div>
    </div>
    <div class="q-badge" id="qBadge">Q 1 / 50</div>
    <div class="score-block right">
      <div class="score-player-name" id="sn2">Challenger</div>
      <div class="score-number" id="sc2">0</div>
    </div>
  </div>
  <div class="timer-wrap"><div class="timer-fill" id="timerFill"></div></div>
  <div class="question-wrap" id="questionWrap">
    <div class="question-eq" id="questionEq">?</div>
    <div>
      <div class="answer-label">Your answer</div>
      <div class="answer-row">
        <input type="number" id="answerInput" placeholder="?" autocomplete="off">
        <button class="lock-btn" id="lockBtn">Lock In</button>
      </div>
    </div>
    <div class="status-row">
      <div class="status-pill" id="p1status">—</div>
      <div class="status-pill" id="p2status">—</div>
    </div>
    <div class="reveal-strip" id="revealStrip">
      <div class="reveal-answer" id="revealAnswer">Answer: ?</div>
      <div class="reveal-pts" id="revealPts"></div>
    </div>
    <div class="next-btn-wrap" id="nextBtnWrap">
      <button class="btn" id="nextBtn" style="display:none;">Next Question →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="resultsScreen">
  <div class="trophy-big" id="trophyEmoji">🏆</div>
  <div class="winner-headline" id="winnerHeadline">Player</div>
  <div class="winner-tag" id="winnerTag">declares The Presser</div>
  <div class="streak-line" id="streakLine"></div>
  <div class="final-scoreboard">
    <div class="final-card" id="fc1"><div class="final-card-name" id="fc1name">Host</div><div class="final-card-score" id="fc1score">0</div></div>
    <div class="final-card" id="fc2"><div class="final-card-name" id="fc2name">Challenger</div><div class="final-card-score" id="fc2score">0</div></div>
  </div>
  <div class="results-actions" id="resultsActions"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAlG4tuJJPhJKMSvgjMUgp-1qjRL8tDInA",
  authDomain: "presser-duel.firebaseapp.com",
  databaseURL: "https://presser-duel-default-rtdb.firebaseio.com",
  projectId: "presser-duel",
  storageBucket: "presser-duel.firebasestorage.app",
  messagingSenderId: "77050422560",
  appId: "1:77050422560:web:f7000c52597276ba0f2345"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TOTAL = 50, TIME_LIMIT = 20;
let myRole=null, roomCode=null, roomRef=null, myName='';
let questions=[], currentQ=0, scores={host:0,challenger:0};
let locked=false, timerInterval=null, timeLeft=TIME_LIMIT;
let audioCtx=null, oscNode=null, gainNode=null;
let unsubs=[], revealShown=false;
let myWins=0; // tracked locally across the session

// ---- Questions ----
function seededRng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}
function makeQuestions(seed){
  const rng=seededRng(seed),qs=[];
  while(qs.length<TOTAL){
    const t=rng();let q,a;
    if(t<0.22){const x=Math.floor(rng()*49)+2,y=Math.floor(rng()*49)+2;q=`${x} + ${y}`;a=x+y;}
    else if(t<0.42){const x=Math.floor(rng()*49)+10,y=Math.floor(rng()*30)+2;q=`${x} − ${y}`;a=x-y;}
    else if(t<0.62){const x=Math.floor(rng()*12)+2,y=Math.floor(rng()*12)+2;q=`${x} × ${y}`;a=x*y;}
    else if(t<0.76){const y=Math.floor(rng()*9)+2,a_=Math.floor(rng()*9)+2;q=`${y*a_} ÷ ${y}`;a=a_;}
    else if(t<0.87){const x=Math.floor(rng()*9)+2;q=`${x}²`;a=x*x;}
    else{const a_=Math.floor(rng()*8)+2,b=Math.floor(rng()*8)+2,c=Math.floor(rng()*8)+2;q=`${a_} + ${b} + ${c}`;a=a_+b+c;}
    qs.push({q,a});
  }
  return qs;
}

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
function unsubAll(){unsubs.forEach(fn=>fn());unsubs=[];}

// ---- Share ----
function shareChallenge(wins) {
  const url = `${location.origin}${location.pathname}?room=${roomCode}`;
  let msg;
  if (wins === 0) {
    msg = `I challenge you to The Presser — 50 maths questions, 20 seconds each. Think you've got it? 👊\n\n${url}`;
  } else if (wins === 1) {
    msg = `I'm undefeated on The Presser. Come take me on if you dare 👊\n\n${url}`;
  } else {
    msg = `${wins} wins in a row on The Presser and still undefeated. You won't last 👊\n\n${url}`;
  }
  if (navigator.share) {
    navigator.share({title:'The Presser',text:msg,url}).catch(()=>copyText(msg));
  } else {
    copyText(msg);
  }
}

function copyText(txt){navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>toast(txt));}

// ---- Audio ----
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function startUrgencyAudio(){
  initAudio();stopUrgencyAudio();
  oscNode=audioCtx.createOscillator();gainNode=audioCtx.createGain();
  oscNode.type='square';oscNode.frequency.value=220;gainNode.gain.value=0;
  oscNode.connect(gainNode);gainNode.connect(audioCtx.destination);oscNode.start();
}
function updateUrgencyAudio(frac){
  if(!gainNode||!oscNode)return;
  if(frac<0.5){const i=(0.5-frac)/0.5;gainNode.gain.value=i*0.15;oscNode.frequency.value=180+i*600;}
  else{gainNode.gain.value=0;}
}
function stopUrgencyAudio(){if(oscNode){try{oscNode.stop();}catch(e){}oscNode=null;}gainNode=null;}

// ---- Timer ----
function startTimer(onEnd){
  clearInterval(timerInterval);timeLeft=TIME_LIMIT;
  const fill=document.getElementById('timerFill'),wrap=document.getElementById('questionWrap');
  fill.style.width='100%';fill.style.background='var(--green)';fill.style.transition='none';
  wrap.classList.remove('urgent');startUrgencyAudio();
  timerInterval=setInterval(()=>{
    timeLeft=Math.max(0,timeLeft-0.1);
    const frac=timeLeft/TIME_LIMIT;
    fill.style.width=(frac*100)+'%';
    if(frac<0.25){fill.style.background='var(--red)';wrap.classList.add('urgent');}
    else if(frac<0.5){fill.style.background='var(--amber)';wrap.classList.remove('urgent');}
    else{fill.style.background='var(--green)';}
    updateUrgencyAudio(frac);
    if(timeLeft<=0){clearInterval(timerInterval);stopUrgencyAudio();wrap.classList.remove('urgent');onEnd();}
  },100);
}

// ---- CREATE ----
document.getElementById('createRoomBtn').addEventListener('click', async()=>{
  const name=document.getElementById('playerName').value.trim();
  if(!name){toast('Enter your name first');return;}
  myName=name;myRole='host';roomCode=genCode();
  roomRef=ref(db,`rooms/${roomCode}`);
  await set(roomRef,{host:{name,score:0,wins:myWins},challenger:null,status:'waiting',seed:Date.now(),currentQ:0,answers:{}});
  enterWaiting(true);
});

// ---- JOIN ----
document.getElementById('joinRoomBtn').addEventListener('click',async()=>{
  const name=document.getElementById('playerName').value.trim();
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(!name){toast('Enter your name first');return;}
  if(!code){toast('Enter a room code');return;}
  await doJoin(name,code);
});

async function doJoin(name,code){
  myName=name;myRole='challenger';roomCode=code;
  roomRef=ref(db,`rooms/${roomCode}`);
  const snap=await get(roomRef);
  if(!snap.exists()){toast('Room not found');return;}
  const d=snap.val();
  if(d.challenger){toast('Room is full');return;}
  if(d.status!=='waiting'){toast('Game already started');return;}
  await update(roomRef,{challenger:{name,score:0,wins:myWins}});
  enterWaiting(false);
}

// ---- WAITING ----
function enterWaiting(isCreator){
  showScreen('waitingScreen');

  // If we just won and are waiting for next challenger, show share button in waiting screen
  if(isCreator && myWins > 0){
    // Replace waiting pulse with share + spinner
    document.getElementById('waitingMsg').innerHTML = '';
    document.getElementById('waitingMsg').className = '';
    document.getElementById('waitingMsg').style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;';
    document.getElementById('waitingMsg').innerHTML = `
      <button class="btn-challenge" id="shareFromWaiting">💪 Challenge Someone</button>
      <div class="challenger-wait" id="afterShareWait" style="display:none;">
        <div class="spinner"></div>
        <div class="challenger-wait-txt">Waiting for challenger…</div>
      </div>
    `;
    document.getElementById('shareFromWaiting').addEventListener('click',()=>{
      shareChallenge(myWins);
      document.getElementById('shareFromWaiting').style.display='none';
      document.getElementById('afterShareWait').style.display='flex';
    });
  }

  const unsub=onValue(roomRef,snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    renderWaitingPlayers(d);
    if(d.status==='countdown'){
      unsubAll();
      questions=makeQuestions(d.seed);
      startCountdown(d);
    }
  });
  unsubs.push(()=>unsub());
}

function renderWaitingPlayers(d){
  const list=document.getElementById('playersList');
  list.innerHTML='';
  if(d.host){
    const el=document.createElement('div');
    el.className='player-pill';
    const wins=d.host.wins??0;
    el.innerHTML=`<span>${d.host.name}</span><span class="badge ${wins>0?'champ':'host'}">${wins>0?`👑 ${wins}W`:'Host'}</span>`;
    list.appendChild(el);
  }
  if(d.challenger){
    const el=document.createElement('div');
    el.className='player-pill';
    const cw=d.challenger.wins??0;
    el.innerHTML=`<span>${d.challenger.name}</span><span class="badge challenger">${cw>0?`${cw}W · `:''}Challenger</span>`;
    list.appendChild(el);

    // Show VS info for challenger
    if(myRole==='challenger'&&d.host){
      const hostWins=d.host.wins??0;
      // Replace waiting message area with VS strip
      const wm=document.getElementById('waitingMsg');
      wm.innerHTML='';
      wm.className='';
      wm.style.cssText='width:100%';
      wm.innerHTML=`
        <div class="vs-strip">
          <div class="vs-label">You're up against</div>
          <div class="vs-name">${d.host.name}</div>
          <div class="vs-record">${hostWins>0?`Undefeated · ${hostWins} win${hostWins>1?'s':''}`:'First time on The Chair'}</div>
        </div>
      `;
    }

    // Show start button for host
    if(myRole==='host') document.getElementById('startGameBtn').classList.remove('hidden');
  }
}

document.getElementById('startGameBtn').addEventListener('click',async()=>{
  await update(roomRef,{status:'countdown'});
});

// ---- COUNTDOWN ----
function startCountdown(roomData){
  showScreen('countdownScreen');
  const el=document.getElementById('countdownNum');
  let n=3;el.textContent=n;
  const iv=setInterval(()=>{
    n--;
    if(n<=0){clearInterval(iv);el.textContent='GO!';setTimeout(()=>beginGame(roomData),700);}
    else{el.textContent=n;el.style.animation='none';void el.offsetWidth;el.style.animation='countPop .4s cubic-bezier(.16,1,.3,1)';}
  },900);
}

// ---- GAME ----
function beginGame(roomData){
  currentQ=0;scores={host:0,challenger:0};
  showScreen('gameScreen');
  document.getElementById('sn1').textContent=roomData.host?.name||'Host';
  document.getElementById('sn2').textContent=roomData.challenger?.name||'Challenger';
  listenRoom();listenQAdvance();loadQuestion();
}

function listenRoom(){
  const unsub=onValue(roomRef,snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    scores.host=d.host?.score??0;scores.challenger=d.challenger?.score??0;
    document.getElementById('sc1').textContent=scores.host;
    document.getElementById('sc2').textContent=scores.challenger;
    updateStatusPills(d,d.answers||{});
    if(d.status==='results'){clearInterval(timerInterval);stopUrgencyAudio();unsubAll();showResults(d);return;}
    if(d.currentQ===currentQ){
      const ans=d.answers||{};
      const both=ans[currentQ]?.host!==undefined&&ans[currentQ]?.challenger!==undefined;
      if(both)showReveal(d,ans[currentQ]);
    }
  });
  unsubs.push(()=>unsub());
}

function listenQAdvance(){
  const unsub=onValue(ref(db,`rooms/${roomCode}/currentQ`),snap=>{
    const q=snap.val();
    if(q!==null&&q!==currentQ&&myRole==='challenger'){currentQ=q;revealShown=false;if(currentQ<TOTAL)loadQuestion();}
  });
  unsubs.push(()=>unsub());
}

function updateStatusPills(d,ans){
  const hL=ans[currentQ]?.host!==undefined,cL=ans[currentQ]?.challenger!==undefined;
  const p1=document.getElementById('p1status'),p2=document.getElementById('p2status');
  p1.textContent=(d.host?.name||'Host')+(hL?' ✓':' …');
  p2.textContent=(d.challenger?.name||'Challenger')+(cL?' ✓':' …');
  p1.className='status-pill'+(hL?' locked-in':' waiting-lock');
  p2.className='status-pill'+(cL?' locked-in':' waiting-lock');
}

function loadQuestion(){
  revealShown=false;locked=false;
  const q=questions[currentQ];
  document.getElementById('questionEq').textContent=q.q;
  document.getElementById('qBadge').textContent=`Q ${currentQ+1} / ${TOTAL}`;
  const inp=document.getElementById('answerInput');
  inp.value='';inp.disabled=false;inp.className='';
  const lb=document.getElementById('lockBtn');
  lb.disabled=false;lb.className='lock-btn';lb.textContent='Lock In';
  document.getElementById('revealStrip').style.display='none';
  const nw=document.getElementById('nextBtnWrap');
  nw.style.display='none';nw.innerHTML='<button class="btn" id="nextBtn" style="display:none;">Next Question →</button>';
  document.getElementById('nextBtn').addEventListener('click',advanceQuestion);
  document.getElementById('questionWrap').classList.remove('urgent');
  inp.focus();
  startTimer(()=>{if(!locked)doLockIn(true);});
}

function doLockIn(forced=false){
  if(locked)return;locked=true;
  clearInterval(timerInterval);stopUrgencyAudio();
  document.getElementById('questionWrap').classList.remove('urgent');
  const val=parseFloat(document.getElementById('answerInput').value);
  const answer=isNaN(val)?null:val;
  document.getElementById('answerInput').disabled=true;
  const lb=document.getElementById('lockBtn');
  lb.disabled=true;lb.className='lock-btn done';lb.textContent=forced?'Time!':'Locked ✓';
  update(roomRef,{[`answers/${currentQ}/${myRole}`]:answer??'__null__'});
}

function showReveal(d,roundAnswers){
  if(revealShown)return;revealShown=true;
  const correct=questions[currentQ].a;
  const hostAns=roundAnswers.host==='__null__'?null:roundAnswers.host;
  const chalAns=roundAnswers.challenger==='__null__'?null:roundAnswers.challenger;
  const myAns=myRole==='host'?hostAns:chalAns;
  const isCorrect=myAns===correct;
  const inp=document.getElementById('answerInput');
  inp.value=myAns??'—';inp.className=isCorrect?'correct':'wrong';
  if(myRole==='host'){
    const updates={};
    if(hostAns===correct)updates['host/score']=(scores.host||0)+1;
    if(chalAns===correct)updates['challenger/score']=(scores.challenger||0)+1;
    if(Object.keys(updates).length)update(roomRef,updates);
  }
  document.getElementById('revealStrip').style.display='block';
  document.getElementById('revealAnswer').textContent=`Answer: ${correct}`;
  document.getElementById('revealPts').textContent=isCorrect?'+1 ✓':myAns===null?'No answer':`You had ${myAns}`;
  const nw=document.getElementById('nextBtnWrap');nw.style.display='block';
  if(myRole==='host'){document.getElementById('nextBtn').style.display='block';}
  else{nw.innerHTML='<div style="font-family:var(--fm);font-size:.65rem;color:var(--muted);text-align:center;letter-spacing:.1em;text-transform:uppercase;padding:.5rem 0;">Waiting for host…</div>';}
}

async function advanceQuestion(){
  const next=currentQ+1;revealShown=false;
  if(next>=TOTAL){await update(roomRef,{status:'results',currentQ:next});}
  else{await update(roomRef,{currentQ:next,answers:{}});currentQ=next;loadQuestion();}
}

document.getElementById('lockBtn').addEventListener('click',()=>doLockIn(false));
document.getElementById('answerInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLockIn(false);});
document.getElementById('nextBtn').addEventListener('click',advanceQuestion);

// ---- RESULTS ----
function showResults(d){
  showScreen('resultsScreen');
  const hs=d.host?.score??0,cs=d.challenger?.score??0;
  const hn=d.host?.name||'Host',cn=d.challenger?.name||'Challenger';
  document.getElementById('fc1name').textContent=hn;
  document.getElementById('fc2name').textContent=cn;
  document.getElementById('fc1score').textContent=hs;
  document.getElementById('fc2score').textContent=cs;

  let iAmWinner=false,isDraw=hs===cs;
  if(!isDraw){
    iAmWinner=(hs>cs&&myRole==='host')||(cs>hs&&myRole==='challenger');
    const winnerName=hs>cs?hn:cn;
    document.getElementById('winnerHeadline').textContent=winnerName;
    document.getElementById('winnerTag').textContent='declares The Presser';
    if(hs>cs)document.getElementById('fc1').classList.add('winner-card');
    else document.getElementById('fc2').classList.add('winner-card');
  } else {
    document.getElementById('winnerHeadline').textContent='Dead Heat';
    document.getElementById('winnerTag').textContent='';
    document.getElementById('trophyEmoji').textContent='🤝';
  }

  const actions=document.getElementById('resultsActions');
  actions.innerHTML='';

  if(iAmWinner){
    myWins++;  // increment session win streak
    // Streak display
    if(myWins===1){
      document.getElementById('streakLine').textContent='Undefeated 👑';
    } else {
      document.getElementById('streakLine').textContent=`${myWins} in a row · Still undefeated 🔥`;
    }

    // Reset room for next challenger (host stays, clears challenger)
    if(myRole==='host'){
      update(roomRef,{'host/wins':myWins,'host/score':0,challenger:null,status:'waiting',answers:{},currentQ:0,seed:Date.now()});
    } else {
      // Challenger won — note their wins in db too
      update(roomRef,{'challenger/wins':myWins});
    }

    // ONE button: pink pulse challenge
    const btn=document.createElement('button');
    btn.className='btn-challenge';
    btn.textContent='💪 Challenge Someone';
    btn.addEventListener('click',()=>{
      shareChallenge(myWins);
      // Replace button with waiting state
      actions.innerHTML=`
        <div class="challenger-wait">
          <div class="spinner"></div>
          <div class="challenger-wait-txt">Challenge sent · waiting for someone to bite…</div>
        </div>
      `;
      // For host, go to waiting room listening for challenger
      if(myRole==='host'){
        // Already reset above — now listen for challenger joining
        const unsub=onValue(roomRef,snap=>{
          if(!snap.exists())return;
          const data=snap.val();
          if(data.challenger){
            unsub(); // stop this listener
            enterWaiting(true); // back to waiting room with start button
          }
        });
      } else {
        // Challenger who won — reload to create fresh room
        setTimeout(()=>location.reload(),1500);
      }
    });
    actions.appendChild(btn);

  } else {
    // Loser — clear streak
    myWins=0;
    document.getElementById('streakLine').textContent='';

    const rematch=document.createElement('button');
    rematch.className='btn';
    rematch.textContent='Challenge';
    rematch.addEventListener('click',()=>{
      // Loser challenges — no wins to brag about, simple link share
      shareChallenge(0);
      actions.innerHTML=`<div style="font-family:var(--fm);font-size:.7rem;color:var(--muted);text-align:center;letter-spacing:.12em;text-transform:uppercase;padding:1rem 0;">Challenge sent</div>`;
    });
    actions.appendChild(rematch);

    const home=document.createElement('button');
    home.className='btn outline';
    home.style.fontSize='.72rem';
    home.textContent='Go Home';
    home.addEventListener('click',()=>location.reload());
    actions.appendChild(home);
  }
}

// ---- AUTO JOIN FROM URL ----
const urlParams=new URLSearchParams(location.search);
const autoRoom=urlParams.get('room');
if(autoRoom){
  document.getElementById('joinCode').value=autoRoom;
  document.getElementById('joinCode').style.borderColor='rgba(244,114,182,.5)';
  toast(`Room loaded — enter your name and accept the challenge!`,3500);
}
</script>
</body>
</html>
